<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes TCP/IP | Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background-color: #f4f6f9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card-custom { 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
            border: none; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        .card-custom:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 10px 15px rgba(0,0,0,0.1); 
        }
        .bg-header { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: white; 
            padding: 3rem 0; 
            border-radius: 0 0 25px 25px; 
            margin-bottom: 3rem; 
        }
        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
        }
    </style>
</head>
<body>

    <div class="bg-header text-center shadow">
        <h1 class="display-5 fw-bold"><i class="fas fa-network-wired me-3"></i>Redes TCP/IP</h1>
        <p class="lead mb-0">Proyecto final</p>
    </div>

    <div class="container">
        <div class="row g-4">
            
            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100 text-center p-4">
                    <div class="icon-box bg-primary bg-opacity-10 text-primary">
                        <i class="fas fa-server fa-2x"></i>
                    </div>
                    <h4 class="card-title fw-bold">MTK1290</h4>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100 text-center p-4">
                    <div class="icon-box bg-success bg-opacity-10 text-success">
                        <i class="fas fa-shield-alt fa-2x"></i>
                    </div>
                    <h4 class="card-title fw-bold">MTK1330</h4>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100 text-center p-4">
                    <div class="icon-box bg-warning bg-opacity-10 text-warning">
                        <i class="fas fa-wifi fa-2x"></i>
                    </div>
                    <h4 class="card-title fw-bold">MTK1210</h4>
                </div>
            </div>
			
			<div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100 text-center p-4">
                    <div class="icon-box bg-warning bg-opacity-10 text-warning">
                        <i class="fas fa-wifi fa-2x"></i>
                    </div>
                    <h4 class="card-title fw-bold">MTK1120</h4>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100 text-center p-4">
                    <div class="icon-box bg-info bg-opacity-10 text-info">
                        <i class="fas fa-cloud fa-2x"></i>
                    </div>
                    <h4 class="card-title fw-bold">MTK1190</h4>
                </div>
            </div>

        </div>
        
        <div class="row mt-5 mb-4">
            <div class="col-12 text-center">
                <hr>
                <p class="text-muted mb-0"><small><i class="fas fa-lock text-success me-1"></i></small></p>
                <p class="text-muted"><small>app.proyecto.internal</small></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
